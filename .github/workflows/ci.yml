name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore toolchain/ISA.sln

      - name: Build
        run: dotnet build toolchain/ISA.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test toolchain/ISA.sln --no-build --configuration Release --verbosity normal
